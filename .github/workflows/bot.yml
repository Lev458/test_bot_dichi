name: Telegram Bot

on:
  schedule:
    # Автоматический запуск каждые 6 часов (лимит GitHub)
    - cron: '0 */6 * * *'
  push:
    # Запуск при каждом обновлении кода
    branches: [ main ]
  workflow_dispatch:
    # Кнопка для ручного запуска в любое время

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Ускоряет повторные запуски

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Telegram Bot
        env:
          # Передаем секреты из настроек репозитория в код
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GTHB_TOKEN: ${{ secrets.GTHB_TOKEN }}
          ALLOWED_CHATS: ${{ secrets.ALLOWED_CHATS}}
          FILE_GIST_NAME: ${{ secrets.FILE_GIST_NAME }}
        # timeout нужен, чтобы GitHub не убил процесс жестко. 
        # Бот поработает 350 минут и завершится красиво, ожидая следующего cron-цикла.
        run: timeout 350m python run.py || echo "Цикл завершен, ожидаем перезапуск..."
